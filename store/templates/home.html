{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Shop Dừa Bến Tre</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #2e8b57;
            padding: 15px;
            text-align: center;
        }

        header a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
        }

        .product-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 30px;
        }

        .product-card {
            background: white;
            width: 220px;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .price {
            color: #e53935;
            font-weight: bold;
            margin: 10px 0;
        }

        .btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e68900;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #2e8b57;
            color: white;
            margin-top: 30px;
        }

        .empty {
            text-align: center;
            margin-top: 40px;
            font-size: 18px;
            color: gray;
        }
    </style>
</head>

<body>

<header>
    <a href="/">Trang chủ</a>
    <a href="/about/">Thông tin</a>
    <a href="/contact/">Liên hệ</a>
</header>

<h1>🥥 Các loại dừa</h1>

{% if products %}
<div class="product-container">

    {% for product in products %}
    <div class="product-card">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p class="price">{{ product.price }} đ</p>

        <a href="{% url 'product_detail' product.id %}">
            <button class="btn">Xem chi tiết</button>
        </a>
    </div>
    {% endfor %}

</div>

{% else %}
    <div class="empty">
        Chưa có sản phẩm nào trong hệ thống.
    </div>
{% endif %}

<footer>
    © 2026 Shop Dừa Bến Tre
</footer>

</body>
</html>
