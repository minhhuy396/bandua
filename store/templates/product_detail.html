{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} - Shop Dừa</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f3f3f3;
        }

        header {
            background: #2e8b57;
            padding: 15px;
            text-align: center;
        }

        header a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            padding: 40px;
            display: flex;
            gap: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .left img {
            width: 420px;
            border-radius: 12px;
        }

        .right {
            flex: 1;
        }

        .price {
            font-size: 30px;
            color: #e53935;
            font-weight: bold;
            margin: 15px 0;
        }

        .quantity {
            margin: 20px 0;
        }

        .quantity input {
            width: 60px;
            padding: 5px;
            font-size: 16px;
            text-align: center;
        }

        .buttons {
            margin-top: 25px;
        }

        .btn-cart {
            background: #ff9800;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            margin-right: 10px;
            transition: 0.3s;
        }

        .btn-cart:hover {
            background: #e68900;
        }

        .btn-buy {
            background: #e53935;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .btn-buy:hover {
            background: #c62828;
        }

        .description {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        footer {
            margin-top: 50px;
            background: #2e8b57;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #2e8b57;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <a href="/">Trang chủ</a>
    <a href="/about/">Thông tin</a>
    <a href="/contact/">Liên hệ</a>
</header>

<div class="container">

    <div class="left">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
    </div>

    <div class="right">
        <h1>{{ product.name }}</h1>

        <div class="price">
            {{ product.price }} đ
        </div>

        <div class="quantity">
            <label>Số lượng:</label>
            <input type="number" value="1" min="1">
        </div>

        <div class="buttons">
            <button class="btn-cart">🛒 Thêm vào giỏ</button>
            <button class="btn-buy">⚡ Mua ngay</button>
        </div>

        <div class="description">
            <h3>Mô tả sản phẩm</h3>
            <p>{{ product.description }}</p>
        </div>

        <a class="back-link" href="/">⬅ Quay lại</a>
    </div>

</div>

<footer>
    © 2026 Shop Dừa Bến Tre
</footer>

</body>
</html>
